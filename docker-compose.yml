services:
  db:
    image: postgres:16
    container_name: mentorship-db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mentorship

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: mentorship-api

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    depends_on:
      - db

    volumes:
      - ./backend:/app

volumes:
  postgres_data: